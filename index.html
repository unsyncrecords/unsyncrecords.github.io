<!DOCTYPE html>
<html>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <meta property="og:title" content="Unsync Records">

    <style>
        @font-face {
            font-family: Newake;

        body {
            background-color: #dedede;
            color: #232323;
        }

        .bar {

            margin: -8px -8px -60px -8px;
        }

        .logo {
            height: 130px;
            margin-top: 54px;
